<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>

    <style>

        *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family:Arial;
        }

        body{
        height:100vh;
        background:#b2d5ba;
        display:flex;
        justify-content:center;
        align-items:center;
        }

        .container{
        background:white;
        padding:40px;
        border-radius:12px;
        width:380px;
        box-shadow:0 10px 25px rgba(0,0,0,0.15);
        }

        h2{
        text-align:center;
        margin-bottom:20px;
        color:#605063;
        }

        input,select{
        width:100%;
        padding:12px;
        margin:10px 0;
        border-radius:8px;
        border:1px solid #ccc;
        }

        button{
        width:100%;
        padding:12px;
        margin-top:10px;
        border:none;
        border-radius:8px;
        background:#248f8d;
        color:white;
        font-weight:bold;
        cursor:pointer;
        }

        button:hover{
        background:#61ada0;
        }

        .login-link{
        margin-top:15px;
        text-align:center;
        }

        a{
        text-decoration:none;
        color:#605063;
        font-weight:bold;
        }

    </style>
</head>

<body>

<div class="container">

    <h2>Criar Conta</h2>

    <form id="registerForm">

        <input type="text" id="nome" placeholder="Nome" required>

        <input type="email" id="email" placeholder="Email" required>

        <input type="password" id="senha" placeholder="Senha" required>

        <select id="categoria" required>
            <option value="">Selecione a categoria</option>
            <option value="ALUNO">Aluno</option>
            <option value="PROFESSOR">Professor</option>
            <option value="ADMIN">Admin</option>
        </select>

        <button type="submit">Cadastrar</button>

    </form>

    <div class="login-link">
        <a href="/login">Já tem conta? Faça login</a>
    </div>

</div>

<script src="register.js"></script>

</body>
</html>
